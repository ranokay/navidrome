name: Apply lyrics phase 4 motion polish

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/apply-lyrics-phase4-motion-polish-once.yml

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: lyrics-sidebar-performance
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Apply motion polish
        run: python3 .github/scripts/apply-lyrics-phase4-motion-polish.py
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Format changed files
        working-directory: ui
        run: npx prettier --write src/audioplayer/lyricsKaraokeConstants.js src/audioplayer/lyricsScroll.js src/audioplayer/lyricsScroll.test.js
      - name: Validate UI
        working-directory: ui
        run: |
          npm run check-formatting
          npm run lint
          npm test
          npm run build
      - name: Commit fixes and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-lyrics-phase4-motion-polish-once.yml
          rm -f .github/scripts/apply-lyrics-phase4-motion-polish.py
          git add -A
          git commit -m "fix(ui): polish lyrics scroll timing"
          git push origin HEAD:lyrics-sidebar-performance
