name: One-off lyrics rendering fix

on:
  push:
    branches:
      - lyrics-sidebar-performance
    paths:
      - .github/workflows/fix-lyrics-gradient-once.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Apply lyrics rendering fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text()

          def write(path, content):
              Path(path).write_text(content)

          def replace_once(content, old, new, label):
              count = content.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected one match, found {count}')
              return content.replace(old, new, 1)

          panel_path = 'ui/src/audioplayer/LyricsPanel.jsx'
          panel = read(panel_path)
          panel = replace_once(
              panel,
              """  lineGroup: {
    width: '100%',
    borderRadius: theme.shape.borderRadius,
    '&[data-active=\"true\"] $line, &[data-lifecycle=\"release\"] $line': {
      color: 'var(--lyrics-active-color)',
    },
    '&[data-active=\"true\"] $auxLine, &[data-lifecycle=\"release\"] $auxLine': {
      color: 'var(--lyrics-active-color)',
    },
  },""",
              """  lineGroup: {
    width: '100%',
    borderRadius: theme.shape.borderRadius,
    transform: 'translateY(0)',
    transition: `transform ${KARAOKE_ANIMATION_MS}ms ${KARAOKE_EASING}`,
    '&[data-highlight-active=\"true\"]': {
      transform: 'translateY(-2px)',
    },
    '&[data-active=\"true\"] $line, &[data-lifecycle=\"release\"] $line': {
      color: 'var(--lyrics-active-color)',
    },
    '&[data-active=\"true\"] $auxLine, &[data-lifecycle=\"release\"] $auxLine': {
      color: 'var(--lyrics-active-color)',
    },
    '@media (prefers-reduced-motion: reduce)': {
      transition: 'none',
      transform: 'none',
    },
  },""",
              'line group motion',
          )
          panel = replace_once(
              panel,
              """const normalizeLineText = (value) =>
  (value || '').trim().replace(/\\s+/g, ' ').toLowerCase()

const shouldShowAuxLine = (mainLine, auxLine) =>
  Boolean(
    auxLine?.value &&
    normalizeLineText(auxLine.value) !== normalizeLineText(mainLine?.value),
  )

const getLineLanes = (line) =>""",
              """const normalizeLineText = (value) =>
  String(value || '')
    .normalize('NFKC')
    .toLocaleLowerCase()
    .replace(/[\\p{P}\\p{S}\\s]+/gu, '')

const shouldShowAuxLine = (mainLine, auxLine) =>
  Boolean(
    auxLine?.value &&
    normalizeLineText(auxLine.value) !== normalizeLineText(mainLine?.value),
  )

const finiteLineTime = (value) => {
  if (value == null || value === '') return null
  const number = Number(value)
  return Number.isFinite(number) ? number : null
}

const getLayerMatchWindow = (lines, index) => {
  const line = lines[index]
  if (!line) return { start: null, end: null }
  return {
    start: finiteLineTime(line.start),
    end: finiteLineTime(line.end) ?? finiteLineTime(lines[index + 1]?.start),
  }
}

const buildUniqueLayerMap = (mainLines, layerLines) => {
  if (!mainLines.length || !layerLines.length) return {}

  const candidates = []
  for (let layerIndex = 0; layerIndex < layerLines.length; layerIndex += 1) {
    const layerWindow = getLayerMatchWindow(layerLines, layerIndex)
    for (let mainIndex = 0; mainIndex < mainLines.length; mainIndex += 1) {
      const mainWindow = getLayerMatchWindow(mainLines, mainIndex)
      let score = null

      if (layerWindow.start != null && mainWindow.start != null) {
        const mainEnd = mainWindow.end ?? mainWindow.start
        const layerEnd = layerWindow.end ?? layerWindow.start
        const overlap = Math.min(mainEnd, layerEnd) - Math.max(
          mainWindow.start,
          layerWindow.start,
        )
        const mainDuration = Math.max(0, mainEnd - mainWindow.start)
        const maxDelta = Math.max(550, Math.min(1400, mainDuration + 420))
        const startDelta = Math.abs(layerWindow.start - mainWindow.start)
        if (overlap < 0 && startDelta > maxDelta) continue
        score =
          startDelta +
          Math.abs(layerIndex - mainIndex) * 30 +
          (overlap < 0 ? 200 : 0)
      } else if (layerIndex === mainIndex) {
        score = 2000
      }

      if (score != null) {
        candidates.push({ layerIndex, mainIndex, score })
      }
    }
  }

  candidates.sort(
    (left, right) =>
      left.score - right.score ||
      left.layerIndex - right.layerIndex ||
      left.mainIndex - right.mainIndex,
  )

  const usedLayers = new Set()
  const usedMainLines = new Set()
  const result = {}
  for (const candidate of candidates) {
    if (
      usedLayers.has(candidate.layerIndex) ||
      usedMainLines.has(candidate.mainIndex)
    ) {
      continue
    }
    usedLayers.add(candidate.layerIndex)
    usedMainLines.add(candidate.mainIndex)
    result[candidate.mainIndex] = layerLines[candidate.layerIndex]
  }
  return result
}

const getLineLanes = (line) =>""",
              'unique layer matching helpers',
          )
          panel = replace_once(
              panel,
              """  const trByMainIndex = useMemo(() => {
    if (!showTranslation || translationLines.length === 0) return {}
    const map = {}
    for (let i = 0; i < mainLines.length; i += 1) {
      const { line } = resolveLayerLineForMain(mainLines, translationLines, i)
      if (line) map[i] = line
    }
    return map
  }, [mainLines, translationLines, showTranslation])

  const prByMainIndex = useMemo(() => {
    if (!showPronunciation || pronunciationLines.length === 0) return {}
    const map = {}
    for (let i = 0; i < mainLines.length; i += 1) {
      const { line } = resolveLayerLineForMain(mainLines, pronunciationLines, i)
      if (line) map[i] = line
    }
    return map
  }, [mainLines, pronunciationLines, showPronunciation])""",
              """  const trByMainIndex = useMemo(() => {
    if (!showTranslation || translationLines.length === 0) return {}
    return buildUniqueLayerMap(mainLines, translationLines)
  }, [mainLines, translationLines, showTranslation])

  const prByMainIndex = useMemo(() => {
    if (!showPronunciation || pronunciationLines.length === 0) return {}
    return buildUniqueLayerMap(mainLines, pronunciationLines)
  }, [mainLines, pronunciationLines, showPronunciation])""",
              'layer maps',
          )
          panel = panel.replace('  resolveLayerLineForMain,\n', '')
          write(panel_path, panel)

          rows_path = 'ui/src/audioplayer/LyricsLineRows.jsx'
          rows = read(rows_path)
          rows = rows.replace('  TOKEN_SHORT_DURATION_MS,\n', '')
          rows = re.sub(
              r"const buildTokenData = \(token, rgb, window, text\) => \{.*?\n\}\n\nconst tokenRef",
              """const buildTokenData = (token, rgb, window, text) => {
  const tonedRGB = getTokenRGB(token, rgb)
  const futureColor = tokenColor(tonedRGB, TOKEN_FUTURE_ALPHA)
  const doneColor = tokenColor(tonedRGB, TOKEN_ACTIVE_ALPHA)
  const softColor = tokenColor(
    tonedRGB,
    TOKEN_FUTURE_ALPHA +
      (TOKEN_ACTIVE_ALPHA - TOKEN_FUTURE_ALPHA) * 0.58,
  )
  const sweepRange = 100 + TOKEN_WIPE_SOFT_SPREAD_PCT
  const activeStop = `calc(var(--lyrics-progress) * ${sweepRange}% - ${TOKEN_WIPE_SOFT_SPREAD_PCT}%)`
  const softStop = `calc(var(--lyrics-progress) * ${sweepRange}% - ${TOKEN_WIPE_EDGE_PCT}%)`
  const futureStop = `calc(var(--lyrics-progress) * ${sweepRange}%)`
  const gradient = `linear-gradient(90deg, ${doneColor} 0%, ${doneColor} ${activeStop}, ${softColor} ${softStop}, ${futureColor} ${futureStop}, ${futureColor} 100%)`

  return {
    style: {
      '--lyrics-progress': 0,
      color: futureColor,
      WebkitTextFillColor: futureColor,
      backgroundImage: 'none',
      ...buildEmphasisStyle(token),
    },
    presentation: {
      rgb: tonedRGB,
      futureAlpha: TOKEN_FUTURE_ALPHA,
      activeAlpha: TOKEN_ACTIVE_ALPHA,
      futureColor,
      doneColor,
      gradient,
    },
  }
}

const tokenRef""",
              rows,
              count=1,
              flags=re.S,
          )
          if 'useCrossfade' in rows:
              raise RuntimeError('token crossfade code was not fully removed')
          write(rows_path, rows)

          timeline_path = 'ui/src/audioplayer/useLyricsTimeline.js'
          timeline = read(timeline_path)
          timeline = re.sub(
              r"\nconst rgba = \(rgb, alpha\) => \{.*?\n\}\n",
              '\n',
              timeline,
              count=1,
              flags=re.S,
          )
          timeline = replace_once(
              timeline,
              """const setProgress = (record, value) => {
  const next = Math.max(0, Math.min(1, value))
  if (record.progress != null && Math.abs(record.progress - next) < 0.001)
    return
  record.progress = next
  record.node.style.setProperty('--lyrics-progress', String(next))
}

const setSolidTokenColor""",
              """const setProgress = (record, value) => {
  const next = Math.max(0, Math.min(1, value))
  if (record.progress != null && Math.abs(record.progress - next) < 0.001)
    return
  record.progress = next
  record.node.style.setProperty('--lyrics-progress', String(next))
}

const setTokenOpacity = (record, value) => {
  const next = Math.max(0, Math.min(1, value))
  if (record.opacity != null && Math.abs(record.opacity - next) < 0.001) return
  record.opacity = next
  record.node.style.opacity = String(next)
}

const setSolidTokenColor""",
              'token opacity helper',
          )
          timeline = re.sub(
              r"const applyTokenState = \(record, state, progress = 0\) => \{.*?\n\}\n\nconst resetToken",
              """const applyTokenState = (record, state, progress = 0) => {
  record.state = state
  record.node.dataset.lyricsState = state
  const presentation = record.presentation || {}
  setTokenOpacity(record, 1)

  if (state === 'active') {
    setGradientTokenColor(record)
    setProgress(record, progress)
    return
  }

  if (state === 'completed') {
    setSolidTokenColor(record, presentation.doneColor || 'currentColor')
    setProgress(record, 1)
    return
  }

  setSolidTokenColor(record, presentation.futureColor || 'currentColor')
  setProgress(record, 0)
}

const setTokenReleasePresentation = (record, progress) => {
  const presentation = record.presentation || {}
  if (record.state !== 'completed') {
    applyTokenState(record, 'completed', 1)
  }
  const activeAlpha = Math.max(0.001, presentation.activeAlpha ?? 1)
  const targetOpacity = Math.min(
    1,
    Math.max(0, (presentation.futureAlpha ?? 0.34) / activeAlpha),
  )
  setTokenOpacity(record, 1 + (targetOpacity - 1) * progress)
}

const resetToken""",
              timeline,
              count=1,
              flags=re.S,
          )
          timeline = replace_once(
              timeline,
              """  const updateLineTokens = useCallback((lineIndex, time) => {
    lineTokenKeysRef.current.get(lineIndex)?.forEach((key) => {
      const record = tokenRecordsRef.current.get(key)
      if (record) setTokenPresentation(record, time)
    })
  }, [])

  const publishActiveIndexes""",
              """  const updateLineTokens = useCallback((lineIndex, time) => {
    lineTokenKeysRef.current.get(lineIndex)?.forEach((key) => {
      const record = tokenRecordsRef.current.get(key)
      if (record) setTokenPresentation(record, time)
    })
  }, [])

  const updateLineReleaseTokens = useCallback((lineIndex, progress) => {
    lineTokenKeysRef.current.get(lineIndex)?.forEach((key) => {
      const record = tokenRecordsRef.current.get(key)
      if (record) setTokenReleasePresentation(record, progress)
    })
  }, [])

  const publishActiveIndexes""",
              'release token callback',
          )
          timeline = replace_once(
              timeline,
              """              setLineState(window.lineIndex, 'release')
              updateLineTokens(window.lineIndex, window.end + lead)""",
              """              setLineState(window.lineIndex, 'release')
              updateLineTokens(window.lineIndex, window.end + lead)
              updateLineReleaseTokens(
                window.lineIndex,
                (current - window.end) / KARAOKE_LINE_RELEASE_MS,
              )""",
              'force seek release fade',
          )
          timeline = replace_once(
              timeline,
              """            setLineState(lineIndex, 'release')
            updateLineTokens(lineIndex, window.end + lead)""",
              """            setLineState(lineIndex, 'release')
            updateLineTokens(lineIndex, window.end + lead)
            updateLineReleaseTokens(lineIndex, 0)""",
              'new release fade',
          )
          timeline = replace_once(
              timeline,
              """      releaseIndexesRef.current.forEach((lineIndex) => {
        const window = timeline.windows[lineIndex]
        if (
          !window?.valid ||
          current >= window.end + KARAOKE_LINE_RELEASE_MS ||
          current < window.end
        ) {
          releaseIndexesRef.current.delete(lineIndex)
          setLineState(lineIndex, 'idle')
          resetLineTokens(
            lineIndex,
            current >= (window?.end ?? Infinity) ? 'inactive-past' : 'future',
          )
        }
      })""",
              """      releaseIndexesRef.current.forEach((lineIndex) => {
        const window = timeline.windows[lineIndex]
        if (
          !window?.valid ||
          current >= window.end + KARAOKE_LINE_RELEASE_MS ||
          current < window.end
        ) {
          releaseIndexesRef.current.delete(lineIndex)
          setLineState(lineIndex, 'idle')
          resetLineTokens(
            lineIndex,
            current >= (window?.end ?? Infinity) ? 'inactive-past' : 'future',
          )
          return
        }
        updateLineReleaseTokens(
          lineIndex,
          (current - window.end) / KARAOKE_LINE_RELEASE_MS,
        )
      })""",
              'release fade loop',
          )
          timeline = replace_once(
              timeline,
              """      updateLineTokens,
    ],""",
              """      updateLineReleaseTokens,
      updateLineTokens,
    ],""",
              'apply dependencies',
          )
          timeline = replace_once(
              timeline,
              """        progress: null,
        state: null,""",
              """        progress: null,
        opacity: null,
        state: null,""",
              'token record opacity',
          )
          timeline = replace_once(
              timeline,
              """          setTokenPresentation(
            record,
            lineWindow.end + (reducedMotion ? 0 : KARAOKE_HIGHLIGHT_LEAD_MS),
          )""",
              """          setTokenPresentation(
            record,
            lineWindow.end + (reducedMotion ? 0 : KARAOKE_HIGHLIGHT_LEAD_MS),
          )
          setTokenReleasePresentation(
            record,
            (lastAppliedTimeRef.current - lineWindow.end) /
              KARAOKE_LINE_RELEASE_MS,
          )""",
              'registered release token fade',
          )
          write(timeline_path, timeline)

          constants_path = 'ui/src/audioplayer/lyricsKaraokeConstants.js'
          constants = read(constants_path)
          constants = constants.replace(
              'export const KARAOKE_ANIMATION_MS = 150',
              'export const KARAOKE_ANIMATION_MS = 220',
          )
          constants = constants.replace(
              'export const KARAOKE_LINE_RELEASE_MS = 180',
              'export const KARAOKE_LINE_RELEASE_MS = 220',
          )
          constants = constants.replace(
              'export const TOKEN_WIPE_SOFT_SPREAD_PCT = 12',
              'export const TOKEN_WIPE_SOFT_SPREAD_PCT = 34',
          )
          constants = constants.replace(
              'export const TOKEN_WIPE_EDGE_PCT = 8',
              'export const TOKEN_WIPE_EDGE_PCT = 12',
          )
          write(constants_path, constants)

          test_path = 'ui/src/audioplayer/LyricsPanel.test.jsx'
          tests = read(test_path)
          insert_after = """    expect(screen.getByText('translation line')).toBeInTheDocument()
  })
"""
          new_test = """

  it('renders each translation line under only its closest main line', () => {
    renderPanel({
      mainLyric: {
        synced: true,
        line: [
          { start: 0, end: 1000, value: 'First main line' },
          { start: 1000, end: 2000, value: 'Closest main line' },
          { start: 2000, end: 3000, value: 'Later main line' },
        ],
      },
      translationLyric: {
        synced: true,
        line: [
          {
            start: 1100,
            end: 2800,
            value: 'One translated line',
          },
        ],
      },
      showTranslation: true,
    })

    const translations = screen.getAllByText('One translated line')
    expect(translations).toHaveLength(1)
    expect(
      translations[0].closest('[data-testid=\"lyrics-line-group\"]'),
    ).toHaveTextContent('Closest main line')
  })
"""
          tests = replace_once(
              tests,
              insert_after,
              insert_after + new_test,
              'unique translation test',
          )
          tests = replace_once(
              tests,
              """  it('crossfades short cues without adding a gradient paint', () => {
    renderPanel({
      mainLyric: {
        synced: true,
        line: [{ start: 0, end: 180, value: 'go' }],
        cueLine: [
          {
            index: 0,
            start: 0,
            end: 180,
            value: 'go',
            cue: [{ start: 0, end: 180, value: 'go' }],
          },
        ],
      },
      audioInstance: { currentTime: 0.02, paused: true },
    })

    const token = screen.getByTestId('lyrics-token')
    expect(token).toHaveAttribute('data-lyrics-state', 'active')
    expect(token.style.backgroundImage).toBe('none')
    expect(token.style.color).toMatch(/^rgba\\(17, 17, 17,/)
  })""",
              """  it('uses a soft gradient wipe for short fast cues', () => {
    renderPanel({
      mainLyric: {
        synced: true,
        line: [{ start: 0, end: 180, value: 'go' }],
        cueLine: [
          {
            index: 0,
            start: 0,
            end: 180,
            value: 'go',
            cue: [{ start: 0, end: 180, value: 'go' }],
          },
        ],
      },
      audioInstance: { currentTime: 0.02, paused: true },
    })

    const token = screen.getByTestId('lyrics-token')
    expect(token).toHaveAttribute('data-lyrics-state', 'active')
    expect(token.style.backgroundImage).toContain('linear-gradient')
    expect(token.style.color).toBe('transparent')
  })""",
              'short cue gradient test',
          )
          tests = replace_once(
              tests,
              """    expect(token).toHaveAttribute('data-lyrics-state', 'completed')
    expect(token.style.backgroundImage).toBe('none')""",
              """    expect(token).toHaveAttribute('data-lyrics-state', 'completed')
    expect(token.style.backgroundImage).toBe('none')
    expect(Number(token.style.opacity)).toBeLessThan(1)
    expect(Number(token.style.opacity)).toBeGreaterThan(0.3)""",
              'release opacity test',
          )
          tests = replace_once(
              tests,
              """    expect(token).toHaveAttribute('data-lyrics-state', 'inactive-past')""",
              """    expect(token).toHaveAttribute('data-lyrics-state', 'inactive-past')
    expect(token.style.opacity).toBe('1')""",
              'released token opacity reset test',
          )
          write(test_path, tests)
          PY
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Format changed UI files
        working-directory: ui
        run: npx prettier --write src/audioplayer/LyricsPanel.jsx src/audioplayer/LyricsLineRows.jsx src/audioplayer/useLyricsTimeline.js src/audioplayer/lyricsKaraokeConstants.js src/audioplayer/LyricsPanel.test.jsx
      - name: Lint UI
        working-directory: ui
        run: npm run check-formatting && npm run lint
      - name: Run UI tests
        working-directory: ui
        run: npm test
      - name: Build UI
        working-directory: ui
        run: npm run build
      - name: Commit fixes and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-lyrics-gradient-once.yml
          git add ui/src/audioplayer
          git commit -m "fix(ui): refine lyrics layer matching and highlighting"
          git push origin HEAD:lyrics-sidebar-performance
