name: Apply lyrics phase 4 line enter

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/apply-lyrics-phase4-line-enter-once.yml

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: lyrics-sidebar-performance
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Apply line-enter timing
        run: python3 .github/scripts/apply-lyrics-phase4-line-enter.py
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Format changed files
        working-directory: ui
        run: npx prettier --write src/audioplayer/LyricsPanel.jsx src/audioplayer/LyricsPanel.test.jsx
      - name: Validate UI
        working-directory: ui
        run: |
          set +e
          {
            npm run check-formatting
            npm run lint
            npm test
            npm run build
          } > /tmp/phase4-line-enter-validation.log 2>&1
          status=$?
          cat /tmp/phase4-line-enter-validation.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/phase4-line-enter-validation.log ../.github/phase4-line-enter-validation-error.txt
            cd ..
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/phase4-line-enter-validation-error.txt
            git commit -m "chore: capture line enter validation failure"
            git push origin HEAD:lyrics-sidebar-performance
            exit 1
          fi
      - name: Commit fixes and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-lyrics-phase4-line-enter-once.yml
          rm -f .github/scripts/apply-lyrics-phase4-line-enter.py
          rm -f .github/phase4-line-enter-validation-error.txt
          git add -A
          git commit -m "fix(ui): align lyrics line enter timing"
          git push origin HEAD:lyrics-sidebar-performance
