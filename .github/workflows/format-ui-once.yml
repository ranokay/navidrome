name: One-off UI formatter

on:
  push:
    branches:
      - lyrics-sidebar-performance
    paths:
      - .github/workflows/format-ui-once.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Format UI sources
        working-directory: ui
        run: npm run prettier
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ui/src
          if git diff --cached --quiet; then
            echo "No formatting changes needed"
            exit 0
          fi
          git commit -m "style(ui): apply prettier formatting"
          git push origin HEAD:lyrics-sidebar-performance
