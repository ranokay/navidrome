name: Apply persistent line lift and character wave

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/apply-persistent-line-lift-and-character-wave-once.yml

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: lyrics-sidebar-performance
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Apply persistent lift and character wave
        run: |
          set +e
          python3 .github/scripts/fix-character-wave-patch.py
          python3 .github/scripts/apply-persistent-line-lift-and-character-wave.py > /tmp/character-wave-patch.log 2>&1
          status=$?
          cat /tmp/character-wave-patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/character-wave-patch.log .github/character-wave-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/character-wave-patch-error.txt
            git commit -m "chore: capture character wave patch failure"
            git push origin HEAD:lyrics-sidebar-performance
            exit 1
          fi
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Format changed files
        working-directory: ui
        run: npx prettier --write src/audioplayer/lyricsKaraokeConstants.js src/audioplayer/LyricsPanel.jsx src/audioplayer/LyricsLineRows.jsx src/audioplayer/useLyricsTimeline.js src/audioplayer/LyricsPanel.test.jsx src/audioplayer/lyricsScroll.test.js
      - name: Validate UI
        working-directory: ui
        run: |
          npm run check-formatting
          npm run lint
          npm test
          npm run build
      - name: Commit fixes and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-persistent-line-lift-and-character-wave-once.yml
          rm -f .github/scripts/apply-persistent-line-lift-and-character-wave.py
          rm -f .github/scripts/fix-character-wave-patch.py
          rm -f .github/character-wave-patch-error.txt
          git add -A
          git commit -m "fix(ui): add persistent lyric lift and character wave"
          git push origin HEAD:lyrics-sidebar-performance
