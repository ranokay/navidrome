name: One-off lyrics pronunciation and flicker fix

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/fix-lyrics-pronunciation-flicker-once.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: lyrics-sidebar-performance
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Apply fixes
        shell: bash
        run: python3 .github/scripts/fix-lyrics-pronunciation-flicker.py
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Format changed files
        working-directory: ui
        run: npx prettier --write src/audioplayer/LyricsPanel.jsx src/audioplayer/LyricsLineRows.jsx src/audioplayer/useLyricsTimeline.js src/audioplayer/LyricsPanel.test.jsx
      - name: Validate UI
        working-directory: ui
        run: |
          npm run check-formatting
          npm run lint
          npm test
          npm run build
      - name: Commit fixes and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/scripts/fix-lyrics-pronunciation-flicker.py
          git rm .github/workflows/fix-lyrics-pronunciation-flicker-once.yml
          git add ui/src/audioplayer
          git commit -m "fix(ui): stabilize lyric highlighting and pronunciation"
          git push origin HEAD:lyrics-sidebar-performance
