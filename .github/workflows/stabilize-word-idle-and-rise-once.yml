name: Stabilize word idle and rise

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/stabilize-word-idle-and-rise-once.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: lyrics-sidebar-performance
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Apply word idle and rise fixes
        run: python3 .github/scripts/stabilize-word-idle-and-rise.py
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Format changed files
        working-directory: ui
        run: npx prettier --write src/audioplayer/LyricsLineRows.jsx src/audioplayer/useLyricsTimeline.js src/audioplayer/useLyricsTimeline.test.js src/audioplayer/LyricsPanel.test.jsx
      - name: Validate UI
        working-directory: ui
        run: |
          set +e
          {
            npm run check-formatting
            npm run lint
            npm test
            npm run build
          } > /tmp/word-idle-validation.log 2>&1
          status=$?
          cat /tmp/word-idle-validation.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/word-idle-validation.log ../.github/word-idle-validation-error.txt
            cd ..
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/word-idle-validation-error.txt
            git commit -m "chore: capture word idle validation failure"
            git push origin HEAD:lyrics-sidebar-performance
            exit 1
          fi
      - name: Commit fixes and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/stabilize-word-idle-and-rise-once.yml
          rm -f .github/scripts/stabilize-word-idle-and-rise.py
          rm -f .github/word-idle-validation-error.txt
          git add -A
          git commit -m "fix(ui): stabilize word idle color and character rise"
          git push origin HEAD:lyrics-sidebar-performance
