name: Apply unified lyrics animation fix

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/apply-unified-lyrics-animation-once.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: lyrics-sidebar-performance
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Apply unified animation fixes
        run: |
          set +e
          python3 .github/scripts/fix-unified-patch-script.py
          python3 .github/scripts/apply-unified-lyrics-animation.py > /tmp/unified-lyrics-fix.log 2>&1
          status=$?
          cat /tmp/unified-lyrics-fix.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/unified-lyrics-fix.log .github/unified-lyrics-fix-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/unified-lyrics-fix-error.txt
            git commit -m "chore: capture unified lyrics patch failure"
            git push origin HEAD:lyrics-sidebar-performance
            exit 1
          fi
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Format changed files
        working-directory: ui
        run: npx prettier --write src/audioplayer/LyricsPanel.jsx src/audioplayer/LyricsLineRows.jsx src/audioplayer/useLyricsTimeline.js src/audioplayer/LyricsPanel.test.jsx src/audioplayer/useLyricsTimeline.test.js
      - name: Validate UI
        working-directory: ui
        run: |
          set +e
          {
            npm run check-formatting
            npm run lint
            npm test
            npm run build
          } > /tmp/unified-lyrics-validation.log 2>&1
          status=$?
          cat /tmp/unified-lyrics-validation.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/unified-lyrics-validation.log ../.github/unified-lyrics-validation-error.txt
            cd ..
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/unified-lyrics-validation-error.txt
            git commit -m "chore: capture unified lyrics validation failure"
            git push origin HEAD:lyrics-sidebar-performance
            exit 1
          fi
      - name: Commit fixes and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-unified-lyrics-animation-once.yml
          rm -f .github/scripts/apply-unified-lyrics-animation.py
          rm -f .github/scripts/fix-unified-patch-script.py
          rm -f .github/unified-lyrics-fix-error.txt
          rm -f .github/unified-lyrics-validation-error.txt
          git add -A
          git commit -m "fix(ui): unify lyrics layer animation lifecycle"
          git push origin HEAD:lyrics-sidebar-performance
