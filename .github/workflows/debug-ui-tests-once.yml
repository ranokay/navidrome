name: One-off UI test diagnostics

on:
  push:
    branches:
      - lyrics-sidebar-performance
    paths:
      - .github/workflows/debug-ui-tests-once.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Run UI tests and capture output
        id: tests
        working-directory: ui
        shell: bash
        run: |
          set +e
          npm test -- --reporter=verbose 2>&1 | tee test-output.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Expose failure diagnostics in PR body
        if: steps.tests.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sed -E 's/\x1B\[[0-9;]*[mK]//g' ui/test-output.log > /tmp/clean.log
          awk '/Failed Tests|FAIL  / { found = 1 } found { print }' /tmp/clean.log > /tmp/failures.log
          if [ ! -s /tmp/failures.log ]; then
            tail -n 100 /tmp/clean.log > /tmp/failures.log
          fi
          gh pr view 7 --json body --jq .body > /tmp/current-body.md
          sed '/<!-- ui-test-debug -->/,/<!-- \/ui-test-debug -->/d' /tmp/current-body.md > /tmp/original-body.md
          {
            echo '<!-- ui-test-debug -->'
            echo '## Temporary UI test diagnostics'
            echo '```text'
            tail -n 160 /tmp/failures.log
            echo '```'
            echo '<!-- /ui-test-debug -->'
            cat /tmp/original-body.md
          } > /tmp/body.md
          gh pr edit 7 --body-file /tmp/body.md
          exit 1
