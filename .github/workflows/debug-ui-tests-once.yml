name: One-off UI test diagnostics

on:
  push:
    branches:
      - lyrics-sidebar-performance
    paths:
      - .github/workflows/debug-ui-tests-once.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Run UI tests and capture output
        id: tests
        working-directory: ui
        shell: bash
        run: |
          set +e
          npm test -- --reporter=verbose 2>&1 | tee test-output.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Post failure diagnostics
        if: steps.tests.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '<!-- ui-test-debug -->'
            echo 'Temporary UI test diagnostics:'
            echo '```text'
            tail -n 300 ui/test-output.log
            echo '```'
          } > /tmp/body.md
          gh pr comment 7 --body-file /tmp/body.md
          exit 1
