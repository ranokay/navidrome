name: One-off UI test diagnostics

on:
  push:
    branches:
      - lyrics-sidebar-performance
    paths:
      - .github/workflows/debug-ui-tests-once.yml

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Run lyrics tests and capture output
        id: tests
        working-directory: ui
        shell: bash
        run: |
          set +e
          npm test -- \
            src/audioplayer/LyricsPanel.test.jsx \
            src/audioplayer/LyricsSidebar.test.jsx \
            src/audioplayer/useEnhancedLyrics.test.js \
            src/audioplayer/useLyricsTimeline.test.js \
            src/audioplayer/lyricsTimeline.test.js \
            src/audioplayer/lyricsScroll.test.js \
            --reporter=verbose 2>&1 | tee test-output.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Restore PR and finish diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sed -E 's/\x1B\[[0-9;]*[mK]//g' ui/test-output.log > /tmp/clean.log
          gh pr view 7 --json body --jq .body > /tmp/current-body.md
          sed '/<!-- ui-test-debug -->/,/<!-- \/ui-test-debug -->/d' /tmp/current-body.md > /tmp/original-body.md

          for id in $(gh api --paginate repos/ranokay/navidrome/issues/7/comments --jq '.[] | select(.body | contains("<!-- ui-test-debug -->")) | .id'); do
            gh api --method DELETE "repos/ranokay/navidrome/issues/comments/$id"
          done

          if [ '${{ steps.tests.outputs.status }}' != '0' ]; then
            {
              echo '<!-- ui-test-debug -->'
              echo '## Temporary targeted UI test diagnostics'
              echo '```text'
              tail -n 120 /tmp/clean.log
              echo '```'
              echo '<!-- /ui-test-debug -->'
              cat /tmp/original-body.md
            } > /tmp/body.md
            gh pr edit 7 --body-file /tmp/body.md
            exit 1
          fi

          gh pr edit 7 --body-file /tmp/original-body.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/debug-ui-tests-once.yml
          git commit -m "chore: remove one-off UI test diagnostics"
          git push origin HEAD:lyrics-sidebar-performance
